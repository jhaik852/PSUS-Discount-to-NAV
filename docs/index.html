<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PSUS — Discount to NAV</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      padding: 28px 32px;
      min-height: 100vh;
    }

    header { margin-bottom: 24px; }
    header h1 { font-size: 20px; font-weight: 600; color: #f0f6fc; letter-spacing: -0.3px; }
    header p  { font-size: 12px; color: #8b949e; margin-top: 5px; }

    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px 20px;
      min-width: 150px;
      flex: 1;
    }
    .stat-label {
      font-size: 10px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 500;
    }
    .stat-value {
      font-size: 26px;
      font-weight: 700;
      margin-top: 6px;
      color: #f0f6fc;
      line-height: 1;
    }
    .stat-sub { font-size: 11px; color: #8b949e; margin-top: 5px; }

    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 20px 22px;
      margin-bottom: 16px;
    }
    .panel-title {
      font-size: 13px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }
    .chart-wrap { position: relative; height: 240px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th {
      text-align: left;
      padding: 8px 14px;
      color: #8b949e;
      border-bottom: 1px solid #30363d;
      font-weight: 500;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    td { padding: 9px 14px; border-bottom: 1px solid #21262d; color: #c9d1d9; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1c2128; }

    .red    { color: #f85149; }
    .orange { color: #d29922; }
    .green  { color: #3fb950; }

    .loading { color: #8b949e; text-align: center; padding: 40px; font-size: 13px; }
    .error   { color: #f85149; text-align: center; padding: 24px; font-size: 13px; }
  </style>
</head>
<body>

<header>
  <h1>PSUS &mdash; Discount to NAV</h1>
  <p>Pershing Square USA, Ltd. (NYSE: PSUS) &nbsp;&middot;&nbsp; <span id="as-of"></span></p>
</header>

<div class="stats-row" id="stats-row">
  <div class="loading">Loading&hellip;</div>
</div>

<div class="panel">
  <div class="panel-title">Discount to NAV (%)</div>
  <div class="chart-wrap"><canvas id="chart-discount"></canvas></div>
</div>

<div class="panel">
  <div class="panel-title">Share Price vs NAV (USD)</div>
  <div class="chart-wrap"><canvas id="chart-price"></canvas></div>
</div>

<div class="panel">
  <div class="panel-title">Historical Data</div>
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Period</th>
        <th>NAV / Share</th>
        <th>NYSE Price</th>
        <th>Discount</th>
      </tr>
    </thead>
    <tbody id="table-body">
      <tr><td colspan="5" class="loading">Loading&hellip;</td></tr>
    </tbody>
  </table>
</div>

<script>
const CSV_URL =
  "https://raw.githubusercontent.com/jhaik852/PSUS-Discount-to-NAV/main/data/psus_nav_database.csv";

const CHART_DEFAULTS = {
  responsive: true,
  maintainAspectRatio: false,
  plugins: { legend: { labels: { color: "#8b949e", usePointStyle: true, boxWidth: 8 } } },
  scales: {
    x: { ticks: { color: "#8b949e", maxTicksLimit: 10 }, grid: { color: "#21262d" } },
    y: { ticks: { color: "#8b949e" },                    grid: { color: "#21262d" } },
  },
};

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.trim());
  return lines.slice(1)
    .filter(l => l.trim())
    .map(line => {
      const vals = line.split(",");
      return Object.fromEntries(headers.map((h, i) => [h, (vals[i] ?? "").trim()]));
    });
}

function discClass(d) {
  return d <= -15 ? "red" : d <= -5 ? "orange" : "green";
}
function discColor(d) {
  return d <= -15 ? "#f85149" : d <= -5 ? "#d29922" : "#3fb950";
}
function fmt(n, dec = 2) { return "$" + n.toFixed(dec); }
function fmtPct(n) { return (n >= 0 ? "+" : "") + n.toFixed(2) + "%"; }

async function main() {
  const resp = await fetch(CSV_URL);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const rows = parseCSV(await resp.text())
    .filter(r => r.date)
    .sort((a, b) => a.date.localeCompare(b.date));

  // Forward-fill NAV so every row has a reference NAV
  let runningNAV = null;
  rows.forEach(r => {
    if (r.nav_per_share) runningNAV = parseFloat(r.nav_per_share);
    r._nav = runningNAV;
  });

  const latest     = [...rows].reverse().find(r => r.nyse_price);
  const latestNAV  = [...rows].reverse().find(r => r.nav_per_share);
  const latestDisc = parseFloat(latest.discount_pct);
  const ipoRow     = rows[0];

  // ----- Stats -----
  document.getElementById("as-of").textContent = `Data as of ${latest.date}`;
  document.getElementById("stats-row").innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Share Price</div>
      <div class="stat-value">${fmt(parseFloat(latest.nyse_price))}</div>
      <div class="stat-sub">${latest.date}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Latest NAV</div>
      <div class="stat-value">${fmt(parseFloat(latestNAV.nav_per_share))}</div>
      <div class="stat-sub">${latestNAV.period} &middot; ${latestNAV.date}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Discount to NAV</div>
      <div class="stat-value ${discClass(latestDisc)}">${fmtPct(latestDisc)}</div>
      <div class="stat-sub">vs NAV of ${fmt(parseFloat(latestNAV.nav_per_share))}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">IPO Price</div>
      <div class="stat-value">${fmt(parseFloat(ipoRow.nyse_price))}</div>
      <div class="stat-sub">${ipoRow.date}</div>
    </div>
  `;

  // ----- Discount chart -----
  const discRows   = rows.filter(r => r.discount_pct);
  const discLabels = discRows.map(r => r.date);
  const discVals   = discRows.map(r => parseFloat(r.discount_pct));

  new Chart(document.getElementById("chart-discount"), {
    type: "line",
    data: {
      labels: discLabels,
      datasets: [{
        label: "Discount to NAV",
        data: discVals,
        borderColor: "#58a6ff",
        backgroundColor: "rgba(88,166,255,0.07)",
        borderWidth: 2,
        pointRadius: 4,
        pointBackgroundColor: discVals.map(discColor),
        fill: true,
        tension: 0.3,
      }],
    },
    options: {
      ...CHART_DEFAULTS,
      plugins: {
        ...CHART_DEFAULTS.plugins,
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => " " + fmtPct(ctx.parsed.y) } },
      },
      scales: {
        x: CHART_DEFAULTS.scales.x,
        y: {
          ...CHART_DEFAULTS.scales.y,
          ticks: { color: "#8b949e", callback: v => v.toFixed(1) + "%" },
        },
      },
    },
  });

  // ----- Price vs NAV chart -----
  const priceRows = rows.filter(r => r.nyse_price);

  new Chart(document.getElementById("chart-price"), {
    type: "line",
    data: {
      labels: priceRows.map(r => r.date),
      datasets: [
        {
          label: "Share Price",
          data: priceRows.map(r => parseFloat(r.nyse_price)),
          borderColor: "#58a6ff",
          backgroundColor: "transparent",
          borderWidth: 2,
          pointRadius: 2,
          tension: 0.3,
        },
        {
          label: "NAV",
          data: priceRows.map(r => r._nav),
          borderColor: "#3fb950",
          backgroundColor: "transparent",
          borderWidth: 2,
          borderDash: [6, 3],
          pointRadius: 0,
          tension: 0.3,
        },
      ],
    },
    options: {
      ...CHART_DEFAULTS,
      plugins: {
        ...CHART_DEFAULTS.plugins,
        tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: ${fmt(ctx.parsed.y)}` } },
      },
      scales: {
        x: CHART_DEFAULTS.scales.x,
        y: {
          ...CHART_DEFAULTS.scales.y,
          ticks: { color: "#8b949e", callback: v => "$" + v.toFixed(0) },
        },
      },
    },
  });

  // ----- Table -----
  document.getElementById("table-body").innerHTML = [...rows]
    .reverse()
    .map(r => {
      const d = r.discount_pct ? parseFloat(r.discount_pct) : null;
      return `
        <tr>
          <td>${r.date}</td>
          <td>${r.period}</td>
          <td>${r.nav_per_share ? fmt(parseFloat(r.nav_per_share)) : "&mdash;"}</td>
          <td>${r.nyse_price   ? fmt(parseFloat(r.nyse_price))    : "&mdash;"}</td>
          <td>${d !== null ? `<span class="${discClass(d)}">${fmtPct(d)}</span>` : "&mdash;"}</td>
        </tr>`;
    })
    .join("");
}

main().catch(err => {
  document.getElementById("stats-row").innerHTML =
    `<div class="error">Failed to load data: ${err.message}</div>`;
});
</script>
</body>
</html>
