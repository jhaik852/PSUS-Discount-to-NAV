name: Send PSUS Daily Email

on:
  schedule:
    - cron: '0 15 * * 1-5'
    - cron: '0 16 * * 1-5'
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Send daily email
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/send_email.py

      - name: Commit updated database
        run: |
          git config user.name  "psus-tracker-bot"
          git config user.email "actions@github.com"
          git add data/psus_nav_database.csv
          git diff --staged --quiet \
            && echo "No changes to commit." \
            || git commit -m "Price update $(date -u +'%Y-%m-%d')" && git push
